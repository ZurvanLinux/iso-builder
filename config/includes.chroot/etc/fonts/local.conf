<?xml version="1.0"?>
<!DOCTYPE fontconfig SYSTEM "fonts.dtd">
<!--
  Zurvan Linux font configuration (ui-ux-localization-plan.md §2).

  Vazirmatn is set as the system default for sans-serif / serif / system-ui,
  which covers the desktop shell, GTK apps, and web browsers.

  DIVERGENCE FLAGGED vs. the spec:
  The spec also asks for "Vazirmatn UI FD" (the Farsi-Digits MONOSPACE variant)
  for terminals/editors. Debian's `fonts-vazirmatn` ships ONLY the proportional
  Vazirmatn family, so forcing it into `monospace` would break terminal grid
  alignment. Monospace is therefore left at the system default here; the UI FD
  variant will be bundled from Google Fonts in Phase 2 (branding-assets, M2.1).
-->
<fontconfig>

  <!-- Default sans-serif -> Vazirmatn -->
  <match target="pattern">
    <test name="family"><string>sans-serif</string></test>
    <edit name="family" mode="prepend" binding="strong">
      <string>Vazirmatn</string>
    </edit>
  </match>

  <!-- Bare "sans" alias -> Vazirmatn -->
  <match target="pattern">
    <test name="family"><string>sans</string></test>
    <edit name="family" mode="prepend" binding="strong">
      <string>Vazirmatn</string>
    </edit>
  </match>

  <!-- system-ui -> Vazirmatn (modern apps request this) -->
  <match target="pattern">
    <test name="family"><string>system-ui</string></test>
    <edit name="family" mode="prepend" binding="strong">
      <string>Vazirmatn</string>
    </edit>
  </match>

  <!-- serif -> Vazirmatn (Persian reads better with Vazirmatn than a Latin serif) -->
  <match target="pattern">
    <test name="family"><string>serif</string></test>
    <edit name="family" mode="prepend" binding="strong">
      <string>Vazirmatn</string>
    </edit>
  </match>

  <!-- Persian/Arabic language specific rendering preferences -->
  <match target="pattern">
    <test name="lang" compare="contains">
      <string>fa</string>
    </test>
    <edit name="family" mode="prepend" binding="strong">
      <string>Vazirmatn</string>
    </edit>
  </match>

  <match target="pattern">
    <test name="lang" compare="contains">
      <string>ar</string>
    </test>
    <edit name="family" mode="prepend" binding="strong">
      <string>Vazirmatn</string>
    </edit>
  </match>

</fontconfig>
