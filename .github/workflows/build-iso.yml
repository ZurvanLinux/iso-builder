name: Build ISO (live-build)

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Optional pre-release tag (e.g. v0.1.0-pre.1). Leave empty to only upload a workflow artifact.'
        required: false
        type: string
  push:
    tags:
      - 'v*.*.*-pre.*'

# Cancel superseded runs on the same ref.
concurrency:
  group: build-iso-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write   # required to create a GitHub Release on tag/dispatch

jobs:
  build:
    name: Build ISO (${{ matrix.arch }})
    runs-on: ${{ matrix.arch == 'amd64' && 'ubuntu-latest' || 'ubuntu-24.04-arm' }}
    timeout-minutes: 120
    strategy:
      fail-fast: false
      matrix:
        arch: [amd64, arm64]
    env:
      ZURVAN_CONFIG_REF: c42d342e58c06cb182882d516f3380af61ecee88
      ZURVAN_ARCH: ${{ matrix.arch }}
    container:
      image: ${{ matrix.arch == 'amd64'
               && 'debian:trixie@sha256:d63a99144861e4e460196ed93d07777490cbeab53ca660c434f2a589a6c50ea3'
               || 'debian:trixie' }}
      options: --privileged

    steps:
      - name: Checkout live-build config
        uses: actions/checkout@v5

      - name: Checkout zurvan-config
        uses: actions/checkout@v5
        with:
          repository: ZurvanLinux/zurvan-config
          path: zurvan-config
          ref: ${{ env.ZURVAN_CONFIG_REF }}

      - name: Provision loop devices
        run: |
          set -eux
          if [ ! -e /dev/loop-control ]; then
            mknod /dev/loop-control c 10 237
          fi
          for i in $(seq 0 7); do
            [ -e "/dev/loop$i" ] || mknod "/dev/loop$i" b 7 "$i"
          done
          losetup -f
          df -h / /mnt 2>/dev/null || df -h /

      - name: Cache apt archives
        uses: actions/cache@v5
        with:
          path: /var/cache/apt/archives
          key: iso-builder-apt-${{ matrix.arch }}-${{ hashFiles('config/package-lists/*.list.chroot', 'auto/config') }}
          restore-keys: |
            iso-builder-apt-${{ matrix.arch }}-

      - name: Install live-build and ISO toolchain
        run: |
          set -eux
          export DEBIAN_FRONTEND=noninteractive
          apt-get update
          ARCH="${ZURVAN_ARCH:-amd64}"
          if [ "$ARCH" = "amd64" ]; then
            GRUB_PKGS="grub-pc-bin grub-efi-amd64-bin"
            ISOLINUX_PKGS="isolinux syslinux syslinux-common"
          else
            GRUB_PKGS="grub-efi-arm64-bin"
            ISOLINUX_PKGS=""
          fi
          if [ "$ARCH" = "arm64" ]; then
            KERNEL_PKG="linux-image-arm64"
          else
            KERNEL_PKG="linux-image-amd64"
          fi
          apt-get install -y --no-install-recommends \
            live-build debootstrap \
            squashfs-tools xorriso \
            ${GRUB_PKGS} \
            ${ISOLINUX_PKGS} \
            mtools dosfstools \
            ca-certificates curl jq \
            rclone \
            build-essential \
            dpkg-dev debhelper fakeroot
          dpkg-query -W live-build debootstrap squashfs-tools xorriso ${GRUB_PKGS} ${ISOLINUX_PKGS} rclone dpkg-dev debhelper fakeroot || true
          printf '%s\n' "$KERNEL_PKG" > "config/package-lists/kernel-${ARCH}.list.chroot"

      - name: Build zurvan-base-files
        run: |
          set -eux
          cd "$GITHUB_WORKSPACE/packages/zurvan-base-files"
          dpkg-buildpackage -us -uc -b
          cd "$GITHUB_WORKSPACE"
          mkdir -p config/packages.chroot
          cp -v packages/zurvan-base-files_*.deb config/packages.chroot/

      - name: Configure (lb config)
        run: |
          set -eux
          cd "$GITHUB_WORKSPACE"
          bash "$GITHUB_WORKSPACE/auto/config"

      - name: Clean live-build caches
        run: |
          set -eux
          cd "$GITHUB_WORKSPACE"
          lb clean --purge || true
          rm -rf chroot/ binary/ .build/ cache/

      - name: Build ISO (lb build)
        run: |
          set -euo pipefail
          set -x
          cd "$GITHUB_WORKSPACE"
          attempt=1
          max=3
          while [ "$attempt" -le "$max" ]; do
            lb build 2>&1 | tee "lb-build-${attempt}.log" && break
            if [ "$attempt" -eq "$max" ]; then
              echo "::error::lb build failed after ${max} attempts"
              exit 1
            fi
            sleep_secs=$((attempt * 30))
            echo "lb build attempt ${attempt}/${max} failed; retrying in ${sleep_secs}s..."
            sleep "$sleep_secs"
            attempt=$((attempt + 1))
          done

      - name: Collect ISO and SHA256
        id: collect
        run: |
          set -eux
          cd "$GITHUB_WORKSPACE"
          mkdir -p out
          ARCH="${ZURVAN_ARCH:-amd64}"
          live_image="live-image-${ARCH}.hybrid.iso"
          cp -v "$live_image" out/ || { echo "No ISO produced: $live_image"; exit 1; }
          cd out
          sha256sum *.iso > SHA256SUMS
          echo "===== SHA256SUMS ====="
          cat SHA256SUMS
          ls -la

      - name: Upload ISO as workflow artifact
        uses: actions/upload-artifact@v6
        with:
          name: zurvan-live-iso-${{ matrix.arch }}
          path: out/
          if-no-files-found: error
          retention-days: 14

      - name: Upload zurvan-base-files deb artifact
        uses: actions/upload-artifact@v6
        with:
          name: zurvan-base-files-deb-${{ matrix.arch }}
          path: packages/zurvan-base-files_*.deb
          if-no-files-found: error
          retention-days: 14

      - name: Upload lb build logs
        if: failure()
        uses: actions/upload-artifact@v6
        with:
          name: lb-build-logs
          path: "lb-build-*.log"
          retention-days: 7

      - name: Resolve release tag
        id: rel
        run: |
          tag="${{ github.event.inputs.release_tag }}"
          if [ -z "$tag" ] && [ "${GITHUB_REF#refs/tags/}" != "$GITHUB_REF" ]; then
            tag="${GITHUB_REF#refs/tags/}"
          fi
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "ver=${tag#v}" >> "$GITHUB_OUTPUT"
          echo "Resolved release tag: ${tag:-<none>}"

      - name: Upload ISO to Cloudflare R2
        if: ${{ steps.rel.outputs.tag != '' }}
        id: r2
        env:
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
          VER: ${{ steps.rel.outputs.ver }}
          ARCH: ${{ matrix.arch }}
        run: |
          set -eux
          cd "$GITHUB_WORKSPACE/out"
          if [ -z "$R2_ACCESS_KEY_ID" ] || [ -z "$R2_SECRET_ACCESS_KEY" ] || [ -z "$R2_ENDPOINT" ] || [ -z "$R2_BUCKET" ]; then
            echo "::error::R2 secrets are not set. Complete the R2 maintainer prereqs (bucket + public access + download.zurvanlinux.org custom domain + R2 API token) and add R2_ACCESS_KEY_ID/R2_SECRET_ACCESS_KEY/R2_ENDPOINT/R2_BUCKET to this repo's secrets before this workflow can publish the ISO."
            exit 1
          fi
          ISO="zurvan-${VER}-${ARCH}.iso"
          cp -v "live-image-${ARCH}.hybrid.iso" "$ISO"
          sha256sum "$ISO" > "${ISO}.sha256"
          export RCLONE_CONFIG_R2_TYPE=s3
          export RCLONE_CONFIG_R2_PROVIDER=Cloudflare
          export RCLONE_CONFIG_R2_REGION=auto
          export RCLONE_CONFIG_R2_ENDPOINT="$R2_ENDPOINT"
          export RCLONE_CONFIG_R2_ACCESS_KEY_ID="$R2_ACCESS_KEY_ID"
          export RCLONE_CONFIG_R2_SECRET_ACCESS_KEY="$R2_SECRET_ACCESS_KEY"
          export RCLONE_CONFIG_R2_NO_CHECK_BUCKET=true
          upload_with_retry() {
            src="$1"
            dest="$2"
            attempt=1
            max=3
            while [ "$attempt" -le "$max" ]; do
              if rclone copyto "$src" "$dest" \
                  --retries 5 \
                  --retries-sleep 10s \
                  --low-level-retries 20; then
                return 0
              fi
              if [ "$attempt" -eq "$max" ]; then
                echo "::error::rclone copyto failed after ${max} attempts: $src -> $dest"
                return 1
              fi
              sleep_secs=$((attempt * 15))
              echo "Upload attempt ${attempt}/${max} failed; retrying in ${sleep_secs}s..."
              sleep "$sleep_secs"
              attempt=$((attempt + 1))
            done
          }
          upload_with_retry "$ISO" "r2:${R2_BUCKET}/iso/${ISO}"
          upload_with_retry "${ISO}.sha256" "r2:${R2_BUCKET}/iso/${ISO}.sha256"
          url="https://download.zurvanlinux.org/iso/${ISO}"
          echo "url=$url" >> "$GITHUB_OUTPUT"
          echo "Published ISO: $url"

      - name: Mid-build disk cleanup
        if: always()
        run: |
          set -eux
          apt-get clean
          rm -rf /var/lib/apt/lists/* chroot/ binary/ .build/ cache/

  publish-release:
    name: Publish GitHub Release
    needs: build
    if: ${{ always() && needs.build.result != 'cancelled' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Download build artifacts
        id: dl
        uses: actions/download-artifact@v7
        with:
          path: artifacts

      - name: Verify at least one ISO was built
        run: |
          if [ ! -d artifacts/zurvan-live-iso-amd64 ] && [ ! -d artifacts/zurvan-live-iso-arm64 ]; then
            echo "::error::No ISO artifacts produced; skipping release creation."
            exit 1
          fi

      - name: Resolve release tag
        id: rel
        run: |
          tag="${{ github.event.inputs.release_tag }}"
          if [ -z "$tag" ] && [ "${GITHUB_REF#refs/tags/}" != "$GITHUB_REF" ]; then
            tag="${GITHUB_REF#refs/tags/}"
          fi
          if [ -z "$tag" ]; then
            echo "tag=" >> "$GITHUB_OUTPUT"
            echo "ver=" >> "$GITHUB_OUTPUT"
            echo "No release tag present; skipping release creation."
            exit 0
          fi
          ver="${tag#v}"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "ver=$ver" >> "$GITHUB_OUTPUT"

      - name: Build release body
        if: ${{ steps.rel.outputs.tag != '' }}
        id: body
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -eux
          ver="${{ steps.rel.outputs.ver }}"
          urls=""
          for arch in amd64 arm64; do
            iso_dir="artifacts/zurvan-live-iso-${arch}"
            if [ -d "$iso_dir" ]; then
              url="https://download.zurvanlinux.org/iso/zurvan-${ver}-${arch}.iso"
              sha="$(cut -d' ' -f1 "$iso_dir/SHA256SUMS")"
              urls="${urls}**${arch}:** ${url}\n**SHA256:** ${sha}\n\n"
            fi
          done
          if [ -z "$urls" ]; then
            echo "::error::No ISO artifacts found"
            exit 1
          fi
          {
            echo "body<<EOF"
            printf '%b' "Zurvan Linux v${ver} pre-release.\n\n${urls}The ISO is hosted on Cloudflare R2 (zero-egress)."
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create or update GitHub Release
        if: ${{ steps.rel.outputs.tag != '' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          API: ${{ github.api_url }}/repos/${{ github.repository }}
        run: |
          set -eux
          rel_id=$(curl -fsSL -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "$API/releases/tags/${{ steps.rel.outputs.tag }}" | jq -r '.id // empty' || true)
          if [ -z "$rel_id" ]; then
            curl -fsSL -X POST \
              -H "Authorization: Bearer $GH_TOKEN" \
              -H "Accept: application/vnd.github+json" \
              "$API/releases" -d "$(jq -n --arg t "${{ steps.rel.outputs.tag }}" \
                --arg n "Zurvan Linux ${{ steps.rel.outputs.tag }}" \
                --arg b '${{ steps.body.outputs.body }}' \
                '{tag_name:$t, name:$n, body:$b, prerelease:true, target_commitish:"main"}")"
          else
            curl -fsSL -X PATCH \
              -H "Authorization: Bearer $GH_TOKEN" \
              -H "Accept: application/vnd.github+json" \
              "$API/releases/$rel_id" -d "$(jq -n --arg b '${{ steps.body.outputs.body }}' '{body:$b}')"
          fi

  test-installed-upgrade:
    name: Test upgrade path (${{ matrix.arch }})
    runs-on: ${{ matrix.arch == 'amd64' && 'ubuntu-latest' || 'ubuntu-24.04-arm' }}
    needs: build
    if: ${{ github.event_name == 'pull_request' }}
    strategy:
      fail-fast: false
      matrix:
        arch: [amd64, arm64]
    env:
      ZURVAN_CONFIG_REF: c42d342e58c06cb182882d516f3380af61ecee88
      ZURVAN_ARCH: ${{ matrix.arch }}
    container:
      image: ${{ matrix.arch == 'amd64'
               && 'debian:trixie@sha256:d63a99144861e4e460196ed93d07777490cbeab53ca660c434f2a589a6c50ea3'
               || 'debian:trixie' }}
      options: --privileged
    steps:
      - name: Checkout live-build config
        uses: actions/checkout@v5

      - name: Checkout zurvan-config
        uses: actions/checkout@v5
        with:
          repository: ZurvanLinux/zurvan-config
          path: zurvan-config
          ref: ${{ env.ZURVAN_CONFIG_REF }}

      - name: Gate arm64 behind arm64-test label
        if: ${{ matrix.arch == 'arm64' }}
        run: |
          LABELS_JSON="${{ toJSON(github.event.pull_request.labels) }}"
          if ! echo "$LABELS_JSON" | grep -q '"arm64-test"'; then
            echo "arm64-test label not present; skipping arm64 test"
            exit 0
          fi

      - name: Download zurvan-base-files deb artifact
        uses: actions/download-artifact@v7
        with:
          name: zurvan-base-files-deb-${{ matrix.arch }}
          path: /tmp/artifact

      - name: Install test dependencies
        run: |
          set -eux
          export DEBIAN_FRONTEND=noninteractive
          apt-get update
          apt-get install -y --no-install-recommends \
            debootstrap

      - name: Run upgrade-path test suite
        run: |
          set -eux
          cd "$GITHUB_WORKSPACE"
          mkdir -p packages
          cp "/tmp/artifact/"zurvan-base-files_*.deb packages/ 2>/dev/null || true
          export CHROOT="/tmp/zurvan-upgrade-chroot"
          tests/upgrade/run.sh || { tests/upgrade/cleanup.sh; exit 1; }
          tests/upgrade/cleanup.sh

      - name: Upload chroot logs on failure
        if: failure()
        uses: actions/upload-artifact@v6
        with:
          name: upgrade-test-logs
          path: /tmp/zurvan-upgrade-chroot/**
          retention-days: 7
