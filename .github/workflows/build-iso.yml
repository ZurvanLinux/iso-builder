name: Build ISO (live-build)

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Optional pre-release tag (e.g. v0.1.0-pre.1). Leave empty to only upload a workflow artifact.'
        required: false
        type: string
  push:
    tags:
      - 'v*.*.*-pre.*'

# Cancel superseded runs on the same ref.
concurrency:
  group: build-iso-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write   # required to create a GitHub Release on tag/dispatch

jobs:
  build:
    name: Build ISO (live-build)
    runs-on: ubuntu-latest
    timeout-minutes: 90
    env:
      ZURVAN_CONFIG_REF: c42d342e58c06cb182882d516f3380af61ecee88
    container:
      # Pinned by digest for reproducibility (plan: pin debian:trixie).
      # amd64 manifest digest of library/debian:trixie at time of commit.
      image: debian:trixie@sha256:d63a99144861e4e460196ed93d07777490cbeab53ca660c434f2a589a6c50ea3
      options: --privileged

    steps:
      - name: Checkout live-build config
        uses: actions/checkout@v5

      - name: Checkout zurvan-config
        uses: actions/checkout@v5
        with:
          repository: ZurvanLinux/zurvan-config
          path: zurvan-config
          ref: ${{ env.ZURVAN_CONFIG_REF }}

      - name: Provision loop devices
        run: |
          set -eux
          # lb_binary mounts the squashfs via losetup. In the privileged container
          # the loop-control device may need creating. Probe at the end.
          if [ ! -e /dev/loop-control ]; then
            mknod /dev/loop-control c 10 237
          fi
          for i in $(seq 0 7); do
            [ -e "/dev/loop$i" ] || mknod "/dev/loop$i" b 7 "$i"
          done
          losetup -f
          # Report free space so disk pressure is visible in logs.
          df -h / /mnt 2>/dev/null || df -h /

      - name: Cache apt archives
        uses: actions/cache@v5
        with:
          path: /var/cache/apt/archives
          # Include auto/config so mirror/archive-area changes invalidate the cache.
          key: iso-builder-apt-${{ runner.os }}-${{ hashFiles('config/package-lists/*.list.chroot', 'auto/config') }}
          restore-keys: |
            iso-builder-apt-${{ runner.os }}-

      - name: Install live-build and ISO toolchain
        run: |
          set -eux
          export DEBIAN_FRONTEND=noninteractive
          apt-get update
          # Explicit toolchain + --no-install-recommends keeps the build host
          # reproducible (live-build's Recommends set drifts across releases).
          # These packages provide mksquashfs, xorriso, isolinux/syslinux (BIOS
          # hybrid), and grub-pc/grub-efi-amd64 binaries (UEFI) that lb_binary needs.
          apt-get install -y --no-install-recommends \
            live-build debootstrap \
            squashfs-tools xorriso \
            isolinux syslinux syslinux-common \
            grub-pc-bin grub-efi-amd64-bin \
            mtools dosfstools \
            ca-certificates curl jq \
            rclone \
            build-essential \
            dpkg-dev debhelper fakeroot
          dpkg-query -W live-build debootstrap squashfs-tools xorriso isolinux grub-pc-bin grub-efi-amd64-bin rclone dpkg-dev debhelper fakeroot

      - name: Build zurvan-base-files
        run: |
          set -eux
          cd "$GITHUB_WORKSPACE/packages/zurvan-base-files"
          dpkg-buildpackage -us -uc -b
          cd "$GITHUB_WORKSPACE"
          mkdir -p config/packages.chroot
          cp -v packages/zurvan-base-files_*.deb config/packages.chroot/

      - name: Configure (lb config)
        run: |
          set -eux
          cd "$GITHUB_WORKSPACE"
          lb config

      - name: Clean live-build caches
        run: |
          set -eux
          cd "$GITHUB_WORKSPACE"
          lb clean || true

      - name: Build ISO (lb build)
        run: |
          set -euo pipefail
          set -x
          cd "$GITHUB_WORKSPACE"
          attempt=1
          max=3
          while [ "$attempt" -le "$max" ]; do
            lb build 2>&1 | tee "lb-build-${attempt}.log" && break
            if [ "$attempt" -eq "$max" ]; then
              echo "::error::lb build failed after ${max} attempts"
              exit 1
            fi
            sleep_secs=$((attempt * 30))
            echo "lb build attempt ${attempt}/${max} failed; retrying in ${sleep_secs}s..."
            sleep "$sleep_secs"
            attempt=$((attempt + 1))
          done

      - name: Collect ISO and SHA256
        id: collect
        run: |
          set -eux
          cd "$GITHUB_WORKSPACE"
          mkdir -p out
          # live-build names the image live-image-<arch>.<type>.iso for iso-hybrid.
          cp -v live-image-amd64.hybrid.iso out/ 2>/dev/null || \
            cp -v *.iso out/ 2>/dev/null || { echo "No ISO produced"; exit 1; }
          cd out
          sha256sum *.iso > SHA256SUMS
          echo "===== SHA256SUMS ====="
          cat SHA256SUMS
          ls -la

      - name: Upload ISO as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: zurvan-minimal-iso
          path: out/
          if-no-files-found: error
          retention-days: 14

      - name: Upload zurvan-base-files deb artifact
        uses: actions/upload-artifact@v4
        with:
          name: zurvan-base-files-deb
          path: packages/zurvan-base-files_*.deb
          if-no-files-found: error
          retention-days: 14

      - name: Upload lb build logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: lb-build-logs
          path: "lb-build-*.log"
          retention-days: 7

      - name: Resolve release tag
        id: rel
        run: |
          tag="${{ github.event.inputs.release_tag }}"
          if [ -z "$tag" ] && [ "${GITHUB_REF#refs/tags/}" != "$GITHUB_REF" ]; then
            tag="${GITHUB_REF#refs/tags/}"
          fi
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "ver=${tag#v}" >> "$GITHUB_OUTPUT"
          echo "Resolved release tag: ${tag:-<none>}"

      - name: Upload ISO to Cloudflare R2
        if: ${{ steps.rel.outputs.tag != '' }}
        id: r2
        env:
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
          VER: ${{ steps.rel.outputs.ver }}
        run: |
          set -eux
          cd "$GITHUB_WORKSPACE/out"
          if [ -z "$R2_ACCESS_KEY_ID" ] || [ -z "$R2_SECRET_ACCESS_KEY" ] || [ -z "$R2_ENDPOINT" ] || [ -z "$R2_BUCKET" ]; then
            echo "::error::R2 secrets are not set. Complete the R2 maintainer prereqs (bucket + public access + download.zurvanlinux.org custom domain + R2 API token) and add R2_ACCESS_KEY_ID/R2_SECRET_ACCESS_KEY/R2_ENDPOINT/R2_BUCKET to this repo's secrets before this workflow can publish the ISO."
            exit 1
          fi
          ISO="zurvan-${VER}-amd64.iso"
          cp -v live-image-amd64.hybrid.iso "$ISO"
          sha256sum "$ISO" > "${ISO}.sha256"
          # rclone, env-configured for the R2 S3-compatible API (no config file).
          export RCLONE_CONFIG_R2_TYPE=s3
          export RCLONE_CONFIG_R2_PROVIDER=Cloudflare
          export RCLONE_CONFIG_R2_REGION=auto
          export RCLONE_CONFIG_R2_ENDPOINT="$R2_ENDPOINT"
          export RCLONE_CONFIG_R2_ACCESS_KEY_ID="$R2_ACCESS_KEY_ID"
          export RCLONE_CONFIG_R2_SECRET_ACCESS_KEY="$R2_SECRET_ACCESS_KEY"
          export RCLONE_CONFIG_R2_NO_CHECK_BUCKET=true
          # Outer retry for multi-GB ISO uploads; rclone also has its own
          # --retries / --low-level-retries for transient API failures.
          upload_with_retry() {
            src="$1"
            dest="$2"
            attempt=1
            max=3
            while [ "$attempt" -le "$max" ]; do
              if rclone copyto "$src" "$dest" \
                  --retries 5 \
                  --retries-sleep 10s \
                  --low-level-retries 20; then
                return 0
              fi
              if [ "$attempt" -eq "$max" ]; then
                echo "::error::rclone copyto failed after ${max} attempts: $src -> $dest"
                return 1
              fi
              sleep_secs=$((attempt * 15))
              echo "Upload attempt ${attempt}/${max} failed; retrying in ${sleep_secs}s..."
              sleep "$sleep_secs"
              attempt=$((attempt + 1))
            done
          }
          upload_with_retry "$ISO" "r2:${R2_BUCKET}/iso/${ISO}"
          upload_with_retry "${ISO}.sha256" "r2:${R2_BUCKET}/iso/${ISO}.sha256"
          url="https://download.zurvanlinux.org/iso/${ISO}"
          echo "url=$url" >> "$GITHUB_OUTPUT"
          echo "Published ISO: $url"

      - name: Create GitHub Release (notes + SHA256SUMS)
        if: ${{ steps.rel.outputs.tag != '' }}
        id: ghrel
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -eux
          cd "$GITHUB_WORKSPACE/out"
          tag="${{ steps.rel.outputs.tag }}"
          ver="${{ steps.rel.outputs.ver }}"
          api="$GITHUB_API_URL/repos/$GITHUB_REPOSITORY"
          sha="$(cut -d' ' -f1 SHA256SUMS)"
          url="${{ steps.r2.outputs.url }}"
          # Release is created ONLY after R2 upload succeeds. The ISO itself
          # is not a GitHub asset (exceeds 2 GB cap); this release holds
          # release notes + the small SHA256SUMS file.
          rel_id=$(curl -fsSL -H "Authorization: Bearer $GH_TOKEN" -H "Accept: application/vnd.github+json" \
              "$api/releases/tags/$tag" | jq -r '.id // empty' || true)
          if [ -z "$rel_id" ]; then
            rel_id=$(curl -fsSL -X POST \
                -H "Authorization: Bearer $GH_TOKEN" \
                -H "Accept: application/vnd.github+json" \
                "$api/releases" -d "$(jq -n --arg t "$tag" --arg n "Zurvan Linux $tag" \
                  --arg b "Zurvan Linux $tag pre-release.\n\n**Download ISO:** $url\n**SHA256:** $sha\n\nThe ISO is hosted on Cloudflare R2 (zero-egress). This GitHub Release holds the release notes and the attached SHA256SUMS file." \
                  '{tag_name:$t, name:$n, body:$b, prerelease:true, target_commitish:"main"}')" \
              | jq -r '.id')
          else
            # Update existing release body in case of a re-run (e.g. after R2 succeeded).
            curl -fsSL -X PATCH \
              -H "Authorization: Bearer $GH_TOKEN" \
              -H "Accept: application/vnd.github+json" \
              "$api/releases/$rel_id" -d "$(jq -n --arg b "Zurvan Linux $tag pre-release.\n\n**Download ISO:** $url\n**SHA256:** $sha\n\nThe ISO is hosted on Cloudflare R2 (zero-egress). This GitHub Release holds the release notes and the attached SHA256SUMS file." '{body:$b}')" >/dev/null || true
          fi
          # Attach only SHA256SUMS (the ISO lives on R2).
          upload_url=$(curl -fsSL -H "Authorization: Bearer $GH_TOKEN" -H "Accept: application/vnd.github+json" \
              "$api/releases/$rel_id" | jq -r '.upload_url')
          upload_base="${upload_url%\{?name,label\}}"
          curl -fsSL -X POST \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -H "Content-Type: text/plain" \
            --data-binary "@SHA256SUMS" "${upload_base}?name=SHA256SUMS" || true
          echo "release_id=$rel_id" >> "$GITHUB_OUTPUT"
          echo "sha=$sha" >> "$GITHUB_OUTPUT"
          echo "ver=$ver" >> "$GITHUB_OUTPUT"

  test-installed-upgrade:
    name: Test installed-system upgrade path
    runs-on: ubuntu-latest
    timeout-minutes: 90
    container:
      image: debian:trixie@sha256:d63a99144861e4e460196ed93d07777490cbeab53ca660c434f2a589a6c50ea3
      options: --privileged
    needs: build
    if: ${{ github.event_name == 'pull_request' }}
    env:
      ZURVAN_CONFIG_REF: c42d342e58c06cb182882d516f3380af61ecee88
    steps:
      - name: Checkout live-build config
        uses: actions/checkout@v5

      - name: Checkout zurvan-config
        uses: actions/checkout@v5
        with:
          repository: ZurvanLinux/zurvan-config
          path: zurvan-config
          ref: ${{ env.ZURVAN_CONFIG_REF }}

      - name: Download zurvan-base-files deb artifact
        uses: actions/download-artifact@v4
        with:
          name: zurvan-base-files-deb
          path: /tmp/artifact

      - name: Install test dependencies
        run: |
          set -eux
          export DEBIAN_FRONTEND=noninteractive
          apt-get update
          apt-get install -y --no-install-recommends \
            debootstrap

      - name: Run upgrade-path test suite
        run: |
          set -eux
          cd "$GITHUB_WORKSPACE"
          mkdir -p packages
          cp "/tmp/artifact/"zurvan-base-files_*.deb packages/ 2>/dev/null || true
          export CHROOT="/tmp/zurvan-upgrade-chroot"
          tests/upgrade/run.sh || { tests/upgrade/cleanup.sh; exit 1; }
          tests/upgrade/cleanup.sh

      - name: Upload chroot logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: upgrade-test-logs
          path: /tmp/zurvan-upgrade-chroot/**
          retention-days: 7
